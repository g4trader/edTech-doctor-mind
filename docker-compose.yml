services:
  db:
    image: pgvector/pgvector:pg16
    container_name: doctor-mind-db
    environment:
      POSTGRES_USER: doctor
      POSTGRES_PASSWORD: doctor
      POSTGRES_DB: doctor_mind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doctor -d doctor_mind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: doctor-mind-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://doctor:doctor@db:5432/doctor_mind
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_CHAT_MODEL: llama3.2
      OLLAMA_EMBED_MODEL: nomic-embed-text
      RAG_TOP_K: 4
      RAG_MIN_SIMILARITY: 0.25
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: doctor-mind-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
